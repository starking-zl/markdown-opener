name: Build Markdown Opener

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: app.exe
            extension: exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: markdown-opener.app
            extension: app
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: markdown-opener
            extension: AppImage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "markdown-opener"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.0-dev

      - name: Build Tauri app
        run: |
          pnpm tauri build

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/app.exe artifacts/
            7z a -tzip -r artifacts/markdown-opener-windows.zip src-tauri/target/release/bundle/msi/*.msi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp -r src-tauri/target/release/bundle/macos/markdown-opener.app artifacts/
            cd src-tauri/target/release/bundle/macos/
            zip -r ../../../../../artifacts/markdown-opener-macos.zip markdown-opener.app
          elif [ "${{ runner.os }}" = "Linux" ]; then
            cp src-tauri/target/release/markdown-opener artifacts/
            cp src-tauri/target/release/bundle/appimage/markdown-opener_*.AppImage artifacts/
            cd src-tauri/target/release/bundle/appimage/
            7z a -tzip -r ../../../../../artifacts/markdown-opener-linux.zip markdown-opener_*.AppImage
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: markdown-opener-${{ runner.os }}
          path: |
            artifacts/
          if-no-files-found: error

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        if: ${{ github.event_name == 'release' }}
        with:
          files: |
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.exe
