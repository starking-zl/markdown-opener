name: Build Markdown Opener

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: app.exe
            extension: exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: markdown-opener.app
            extension: app
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: markdown-opener
            extension: AppImage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "markdown-opener"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          
          if [ "${{ runner.os }}" = "Windows" ]; then
            if [ -f "src-tauri/target/release/app.exe" ]; then
              cp src-tauri/target/release/app.exe artifacts/
            fi
            if [ -d "src-tauri/target/release/bundle/msi" ]; then
              7z a -tzip -r artifacts/markdown-opener-windows.zip src-tauri/target/release/bundle/msi/*.msi
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            if [ -d "src-tauri/target/release/bundle/macos/markdown-opener.app" ]; then
              cp -r src-tauri/target/release/bundle/macos/markdown-opener.app artifacts/
              cd src-tauri/target/release/bundle/macos/
              zip -r ../../../../../artifacts/markdown-opener-macos.zip markdown-opener.app
            elif [ -d "src-tauri/target/release/bundle/dmg" ]; then
              cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/
            else
              echo "No macOS bundle found, checking for executable..."
              if [ -f "src-tauri/target/release/markdown-opener" ]; then
                cp src-tauri/target/release/markdown-opener artifacts/
              fi
            fi
          elif [ "${{ runner.os }}" = "Linux" ]; then
            echo "Looking for Linux artifacts..."
            ls -la src-tauri/target/release/ || true
            if [ -d "src-tauri/target/release/bundle" ]; then
              ls -la src-tauri/target/release/bundle/ || true
            fi
            
            if [ -f "src-tauri/target/release/markdown-opener" ]; then
              cp src-tauri/target/release/markdown-opener artifacts/
              chmod +x artifacts/markdown-opener
            fi
            
            if [ -d "src-tauri/target/release/bundle/appimage" ]; then
              APPIMAGE_FILE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" -type f 2>/dev/null | head -1)
              if [ -n "$APPIMAGE_FILE" ]; then
                cp "$APPIMAGE_FILE" artifacts/
                chmod +x "$(basename "$APPIMAGE_FILE")"
              fi
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: markdown-opener-${{ runner.os }}
          path: artifacts/
          if-no-files-found: ignore

      - name: Upload Release Assets
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.exe
            artifacts/*.dmg
